# Build and deploy the MkDocs Material site to GitHub Pages.
#
# GATED to workflow_dispatch (manual trigger) only while this repo is
# private. Once we move to the public repo, uncomment the `push` block
# below to enable auto-deploy on every docs change.
#
# Private-repo Pages requires a paid GitHub plan; auto-triggering during
# the pre-launch window would either silently fail or publish to a URL
# only reachable by collaborators — neither is what we want.
#
# To manually test the site build (does NOT publish): run `mkdocs build`
# locally. To manually publish: Actions tab → "docs" → "Run workflow".
#
# When flipping to public: uncomment the push trigger; site publishes to
# gh-pages branch; point docs.novomcp.com at that branch (Settings → Pages).

name: docs

on:
  workflow_dispatch:
  # Uncomment when the repo is public:
  # push:
  #   branches: [main]
  #   paths:
  #     - docs/**
  #     - mkdocs.yml
  #     - CHANGELOG.md
  #     - .github/workflows/docs.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install MkDocs
        run: pip install mkdocs-material pymdown-extensions
      - name: Build + deploy to gh-pages
        run: mkdocs gh-deploy --force --clean --verbose
