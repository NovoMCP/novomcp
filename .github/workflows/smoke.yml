# Boot smoke: verifies a fresh clone actually runs.
#
# Runs on every push to main and every pull request. Boots the engine from the
# orchestrator/ layout at the repo root and exercises the core surfaces. Any
# failure means a change broke the fresh-clone experience and needs a fix
# before merge, not after.

name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  boot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: orchestrator/requirements.txt

      - name: Prepare layout
        # The engine lives at orchestrator/ in the repo root; expose it at the
        # path the downstream steps expect.
        run: |
          if [ ! -d "orchestrator" ]; then
            echo "Expected orchestrator/ at the repo root."
            exit 1
          fi
          ln -s "$GITHUB_WORKSPACE" /tmp/mirror
          ls /tmp/mirror/orchestrator/main_https.py

      - name: Install engine deps
        working-directory: /tmp/mirror/orchestrator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Boot engine
        working-directory: /tmp/mirror/orchestrator
        env:
          NOVO_AUDIT_PATH: /tmp/audit.jsonl
        run: |
          python main_https.py &
          echo $! > /tmp/engine.pid
          # Wait for /health to become reachable
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8018/health > /dev/null; then
              echo "engine responding after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8018/health > /dev/null

      - name: Health check
        run: |
          resp=$(curl -sf http://localhost:8018/health)
          echo "$resp"
          echo "$resp" | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='healthy', d"

      - name: Tools listing (core mode filter)
        run: |
          n=$(curl -sf http://localhost:8018/mcp/tools -H 'Authorization: Bearer x' \
              | python -c "import sys,json; print(len(json.load(sys.stdin)['tools']))")
          echo "tools listed: $n"
          test "$n" -gt 0

      - name: calculate_properties in-process (aspirin)
        run: |
          resp=$(curl -sf -X POST http://localhost:8018/mcp/tools/calculate_properties \
            -H 'Authorization: Bearer x' \
            -H 'Content-Type: application/json' \
            -d '{"arguments": {"smiles": "CC(=O)Oc1ccccc1C(=O)O"}}')
          echo "$resp" | python -m json.tool
          echo "$resp" | python -c "
          import sys, json
          d = json.load(sys.stdin)['result']
          assert d['source'] == 'rdkit-local', d.get('source')
          assert 170 < d['molecular_weight'] < 185, d.get('molecular_weight')
          assert 1.0 < d['logp'] < 2.0, d.get('logp')
          assert d['lipinski_pass'] is True
          print('aspirin properties within expected ranges')
          "

      - name: JSON-RPC initialize handshake
        run: |
          curl -sf -X POST http://localhost:8018/mcp/ \
            -H 'Authorization: Bearer x' \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{}}}' \
            | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['result']['protocolVersion'] == '2024-11-05'
          assert d['result']['serverInfo']['name'] == 'NovoMCP'
          print('JSON-RPC initialize OK')
          "

      - name: Audit sink recorded the call
        run: |
          test -f /tmp/audit.jsonl
          last=$(tail -1 /tmp/audit.jsonl)
          echo "$last"
          echo "$last" | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['event'] == 'tool_call'
          assert d['payload']['tool'] == 'calculate_properties'
          print('audit line OK')
          "

      - name: Shutdown
        if: always()
        run: |
          if [ -f /tmp/engine.pid ]; then
            kill $(cat /tmp/engine.pid) 2>/dev/null || true
          fi

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint deps
        run: pip install ruff

      - name: Ruff (style + basic errors)
        if: hashFiles('orchestrator/**/*.py') != ''
        working-directory: orchestrator
        continue-on-error: true  # Report but don't fail the build until baseline stabilizes.
        run: ruff check .

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Security scan (infra + secrets + closed-code leaks)
        run: python3 scripts/security_scan.py
