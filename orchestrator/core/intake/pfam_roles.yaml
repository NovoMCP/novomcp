# Pfam family -> metal functional role lookup
# Used by intake.pfam.lookup_role().
#
# Values: structural | catalytic | electron | transport
#   structural    -> metal stabilizes a fold; classical MD with non-bonded
#                    Li-Merz parameters is acceptable. Will route to MCPB
#                    in v1 per Nash decision rule (distal metal = MCPB).
#   catalytic     -> metal in an enzyme active site or substrate-bound
#                    cofactor. Refuse in v0; route to QM/MM in a future
#                    branch per Nash decision rule (active-site = QM/MM).
#   electron      -> metal in electron-transfer site. Treat like
#                    structural for routing, flag in warnings.
#   transport     -> metal transport protein. Structural treatment with a flag.
#
# Matching (see intake.pfam.lookup_role) is case-insensitive and ignores
# underscores/hyphens, so "EF_hand", "EF-hand", "efhand" all resolve to
# the same entry. Suffix stripping and substring fallback handle family
# subtypes (e.g. "Peptidase_M10A" matches "peptidase_m10").
#
# Add new entries here without a code deploy — the file is loaded at
# service startup. Format is a flat dict at the top level.
# ----------------------------------------------------------------------

# --- Structural Zn ---
