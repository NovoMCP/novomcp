[pytest]
# Pytest configuration for NovoMCP

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Add current directory to Python path
pythonpath = .

# Show extra test summary info
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short
    -v

# Markers for test categorization
markers =
    asyncio: Async tests (requires pytest-asyncio)
    integration: Integration tests (may require services)
    unit: Unit tests (isolated, no external dependencies)
    slow: Slow tests (>1s execution time)
    phase1: Phase 1 (Critical Stability) fixes

# Async test configuration
asyncio_mode = auto

# Test output
console_output_style = progress

# Coverage options (if pytest-cov is installed)
[coverage:run]
source = ai,core,routers
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
